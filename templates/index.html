<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>智能座舱AI情报日报</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; max-width: 900px; margin: 0 auto; padding: 20px; background: #fafafa; }
        h1 { color: #1a73e8; border-bottom: 3px solid #1a73e8; padding-bottom: 10px; }
        .date { color: #666; font-size: 14px; }
        .section { background: #fff; border-radius: 12px; padding: 24px; margin-bottom: 24px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
        .section h2 { margin-top: 0; }
        .ai-products h2 { color: #e91e63; }
        .dev-tools h2 { color: #9c27b0; }
        .auto-eco h2 { color: #00bcd4; }
        .summary { background: #f5f5f5; padding: 15px; border-radius: 8px; margin: 10px 0; }
        .action { background: #e8f5e9; border-left: 4px solid #4caf50; padding: 12px; margin-top: 10px; }
        .core-advice { background: #fff3e0; border-left: 4px solid #ff9800; padding: 20px; border-radius: 8px; }
    </style>
</head>
<body>
    <h1>☀️ 智能座舱AI情报日报</h1>
    <p class="date">📅 {{DATE}}</p>
    
    {{CONTENT}}
    
    <div class="core-advice">
        <h2>💡 今日核心建议</h2>
        <p>请查看上方各板块详情...</p>
    </div>
</body>
</html>
