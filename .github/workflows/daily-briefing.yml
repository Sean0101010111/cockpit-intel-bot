name: ☀️ 每日座舱AI情报速递

on:
  schedule:
    # UTC 1:00 = 北京时间 9:00
    - cron: '0 1 * * *'
  workflow_dispatch: # 手动触发

permissions:
  contents: write        # 允许提交报告到仓库
  pages: write           # 允许部署 Pages
  id-token: write        # 允许 Pages 部署认证

jobs:
  daily-briefing:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: 📥 拉取代码
        uses: actions/checkout@v4

      - name: 🟢 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 📦 安装依赖
        run: npm install

      - name: 📰 抓取昨日AI资讯
        run: |
          mkdir -p briefings
          RAW_NEWS=$(node scripts/fetch-news.js)
          echo "$RAW_NEWS" > /tmp/raw_news.json
          NEWS_COUNT=$(cat /tmp/raw_news.json | python3 -c 'import sys,json;d=json.load(sys.stdin);print(len(d))' 2>/dev/null || echo '?')
          echo "✅ 抓取完成: ${NEWS_COUNT} 条资讯"

      - name: 🧠 LLM生成座舱情报
        env:
          LLM_API_URL: ${{ secrets.LLM_API_URL }}
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
          LLM_MODEL: ${{ vars.LLM_MODEL || 'deepseek-chat' }}
        run: |
          BRIEFING=$(node scripts/generate-briefing.js /tmp/raw_news.json)
          TODAY=$(date +%Y-%m-%d)
          echo "$BRIEFING" > "./briefings/${TODAY}.md"
          echo "✅ 情报生成完成: briefings/${TODAY}.md"
          echo "📝 预览:"
          head -c 300 "./briefings/${TODAY}.md"

      - name: 💾 提交报告到仓库
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add ./briefings/
          git diff --quiet && git diff --staged --quiet || git commit -m "📝 添加 $(date +%Y-%m-%d) 情报"
          git push

      - name: 🏗️ 构建情报网站
        run: node scripts/build-site.js

      - name: 📤 部署到 GitHub Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./_site

  deploy:
    needs: daily-briefing
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: 🚀 部署
        id: deployment
        uses: actions/deploy-pages@v4
