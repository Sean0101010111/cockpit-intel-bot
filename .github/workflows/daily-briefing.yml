name: Daily AI Intelligence Report
on:
  schedule:
    - cron: '0 1 * * *'  # 每天早上9点（北京时间）
  workflow_dispatch:  # 手动触发
permissions:
  contents: write      # ← 添加这一行！允许写入内容
jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Fetch News
        run: node scripts/fetch-news.js > data/index.html

      - name: Generate Report
        env:
          ARK_API_KEY: ${{ secrets.ARK_API_KEY }}
        run: node scripts/generate-report.js

      - name: Build Site
        run: node scripts/build-site.js

      - name: Deploy
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./_site
