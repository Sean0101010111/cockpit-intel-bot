name: ☀️ 每日座舱AI情报速递

on:
  schedule:
    - cron: '0 1 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Fetch News
        run: node scripts/fetch-news.js > data/index.html

      - name: Generate Report
        env:
          ARK_API_KEY: ${{ secrets.ARK_API_KEY }}
        run: node scripts/generate-report.js

      - name: Build Site
        run: node scripts/build-site.js

      - name: Deploy
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./_site
